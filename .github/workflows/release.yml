name: Release

# Build prebuilt binaries for each platform and attach them to the release when
# a version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            linker: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install cross linker
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y "${{ matrix.linker }}"
          mkdir -p .cargo
          {
            echo '[target.aarch64-unknown-linux-gnu]'
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --bins --target "${{ matrix.target }}"

      - name: Package
        run: |
          tar -C "target/${{ matrix.target }}/release" -czf \
            "noissh-${{ matrix.target }}.tar.gz" noissh noisshd
          shasum -a 256 "noissh-${{ matrix.target }}.tar.gz" > \
            "noissh-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            noissh-${{ matrix.target }}.tar.gz
            noissh-${{ matrix.target }}.tar.gz.sha256
