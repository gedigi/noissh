# cargo-deny configuration — supply-chain hardening for noissh.
# Run locally with:  cargo deny check
# CI runs the same check (see .github/workflows/ci.yml).

[graph]
# Check all targets the project actually builds for. Leaving this empty makes
# cargo-deny consider every target triple, which would pull in licenses/advisories
# for platforms we never ship.
all-features = true

[advisories]
# Pull advisory data from the RustSec database.
db-urls = ["https://github.com/rustsec/advisory-db"]
# Fail the build on any crate with a known security vulnerability.
version = 2
# `unmaintained` defaults to "all"; "workspace" only flags unmaintained crates
# that are direct workspace dependencies, which avoids noise from deep transitive
# crates we cannot act on while still surfacing problems we own.
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # daemonize: flagged unmaintained (no repo activity), but there is NO safe
    # upgrade available and we use it only for the optional root-daemon double-fork.
    # The crate is forbid(unsafe)-compatible from our side and the surface we use
    # is tiny. Revisit if a maintained fork appears. (advisory is "unmaintained",
    # not a vulnerability.)
    "RUSTSEC-2025-0069",
]

[licenses]
version = 2
# Allow-list of the SPDX licenses actually present in this dependency tree.
# Generated by inspecting `cargo deny list` / `cargo deny check licenses`.
allow = [
    "MIT",                          # the bulk of the tree + all workspace crates
    "Apache-2.0",                   # dual-licensed Rust ecosystem crates (snow, syn, ...)
    "Apache-2.0 WITH LLVM-exception", # rustix / linux-raw-sys / wasi / wit-bindgen
    "BSD-3-Clause",                 # curve25519-dalek, subtle
    "ISC",                          # ring, untrusted
    "Unicode-3.0",                  # unicode-ident data tables
]
# Crates with no SPDX metadata are confidence-scored against embedded license
# text; require a high match before accepting.
confidence-threshold = 0.93
exceptions = []

# The workspace's own crates are MIT-licensed via `[workspace.package] license =
# "MIT"` in the root Cargo.toml (and the repo-root LICENSE file). The path crates
# under crates/ inherit version/edition but not the license field, so cargo-deny's
# synthesized manifest reports them as "unlicensed". Clarify them explicitly as MIT.
[[licenses.clarify]]
name = "noissh"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "auth"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "noise-core"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "predict"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "proto"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "pty"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "term"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "transport"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "wire"
expression = "MIT"
license-files = []

[bans]
# Surface accidental duplicate-version bloat without failing the build: the tree
# is intentionally lean, so any new duplicate is worth a human glance.
multiple-versions = "warn"
# Intra-workspace path deps use `foo.workspace = true`, which cargo-deny reports as
# a wildcard. Because the workspace crates are not marked `publish = false`,
# `allow-wildcard-paths` does not exempt them, so we warn (rather than deny) here:
# real registry `version = "*"` deps still get surfaced for a human to catch.
wildcards = "warn"
allow-wildcard-paths = true
# Prefer the highest semver-compatible version when duplicates do appear.
highlight = "all"
allow = []
deny = []

[sources]
# Only allow crates from the official crates.io registry; reject anything pulled
# from an unexpected registry or git source.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
